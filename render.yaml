services:
  - type: web
    name: glassmorphism-dashboard
    env: node
    region: oregon
    buildCommand: npm install && npm install --prefix frontend && npm run build --prefix frontend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/todos
