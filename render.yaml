services:
  # Backend Service
  - type: web
    name: glassmorphism-backend
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/todos

  # Frontend Service
  - type: web
    name: glassmorphism-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        value: https://glassmorphism-backend.onrender.com/api
