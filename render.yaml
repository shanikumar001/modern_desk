services:
  # Backend Service
  - type: web
    name: modern-desk
    env: node
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/todos
    domain: modern-desk.onrender.com

  # Frontend Service
  - type: static
    name: modern-homescreen
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s dist
    envVars:
      - key: VITE_API_URL
        value: https://modern-desk-urxm.onrender.com/api
    domain: modern-homescreen.onrender.com
